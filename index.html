<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Private Video App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: #ffffff;
    }

    header {
      background-color: #1f1f1f;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background-color: #1c1c1c;
      border-radius: 10px;
      padding: 15px;
      width: 420px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 240px;
      border-radius: 8px;
      border: none;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #aaa;
    }
  </style>

</head>

<body>

<header>
  🎬 My Private Video App
</header>

<div class="container">

  <!-- Video 1 -->

  <div class="card">
    <h3>Sample Video 1</h3>
    <iframe 
      src="https://drive.google.com/file/d/1nrP2Jikx289Ob9Igqodwtcpv5gw8Btsr/preview"
      allow="autoplay">
    </iframe>
  </div>

</div>

<footer>
  © 2026 My Video App
</footer>

</body>
</html>
